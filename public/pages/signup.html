<!DOCTYPE html>
<html>
    <head>
        <title>Login Page Demo</title>
        <link rel="stylesheet" href="../index.css">
        <script type="module" src="../app.js" defer></script>
    </head>
    <body>
        <h1>Sign Up</h1>
        <main>
            <form id="signup-form">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Username" autocomplete="username">
                <div id="username-error" class="error-message"></div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" autocomplete="email">
                <div id="email-error" class="error-message"></div>
                <label for="password">Password</label>
                <div class="show-password">
                    <input type="password" id="password" name="password" placeholder="Password">
                    <button type="button" id="show-password-button"></button>
                </div>
                <div id="password-error" class="error-message"></div>
                <!-- <label for="confirm-password">Confirm Password</label>
                <div class="show-password">
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Password" required>
                    <button type="button" id="show-password-button"></button>
                </div> -->
                <button type="button" id="signup-button">Sign up</button>
            </form>
            <p class="horizontal-line"><span>or</span></p>
            <button id="sign-in-with-Google-button">Sign up with Google</button>
            <p>Already have an account? <a href="../index.html">Log in</a></p>
        </main>
    </body>
</html>
