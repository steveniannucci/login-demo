<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Page Demo</title>
        <link rel="stylesheet" href="./index.css">
        <script type="module" src="./app.js" defer></script>
    </head>
    <body>
        <h1>Log In</h1>
        <main>
            <form id="login-form">
                <div id="login-error" class="error-message"></div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" autocomplete="email">
                <div id="email-error" class="error-message"></div>
                <label for="password">Password</label>
                <div class="show-password">
                    <input type="password" id="password" name="password" placeholder="Password">
                    <button type="button" id="show-password-button"></button>
                </div>
                <div id="password-error" class="error-message"></div>
                <!-- <p id="forgot-password-link"><a href="#">Forgot your password?</a></p> -->
                <button type="button" id="login-button">Log in</button>
            </form>
            <p class="horizontal-line"><span>or</span></p>
            <button id="sign-in-with-Google-button">Sign in with Google</button>
            <p>Need an account? <a href="pages/signup.html">Sign up</a></p>
        </main>
    </body>
</html>
