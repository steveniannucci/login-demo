<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Page Demo</title>
        <link rel="stylesheet" href="./index.css">
        <script type="module" src="./app.js" defer></script>
    </head>
    <body>
        <h1>Log In</h1>
        <main>
            <form id="login-form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
                <p id="forgot-password-link"><a href="#">Forgot your password?</a></p>
                <button type="button" id="login-button">Log in</button>
            </form>
            <p class="horizontal-line"><span>or</span></p>
            <section id="whenSignedOut">
                <button id="signInBtn">Sign in with Google</button>
            </section>
            <p>Need an account? <a href="pages/signup.html">Sign up</a></p>
        </main>
    </body>
</html>
